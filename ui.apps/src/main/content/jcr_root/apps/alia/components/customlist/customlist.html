<!--/* customlist.html */-->
<sly data-sly-use.model="it.codeland.academy.alia.core.models.SubPageTextModel"/>

<div class="cmp-customlist"
     data-cmp-is="customlist"
     data-resource-path="${resource.path @ context='attribute'}">

    <!--/* Section Label */-->
    <sly data-sly-test="${properties.sectionLabel}">
        <h2 class="cmp-customlist__label">${properties.sectionLabel @ context='text'}</h2>
    </sly>

    <!--/* Initial server-side rendered items (first page) */-->
    <sly data-sly-test="${model.pageItems.size > 0}">
        <ul class="cmp-customlist__grid cmp-customlist__grid--cols-${properties.cardsPerRow @ context='attribute'}">
            <sly data-sly-list.item="${model.pageItems}">
                <li class="cmp-customlist__card">

                    <!--/* Page title as link */-->
                    <h3 class="cmp-customlist__title">
                        <a href="${item.path @ extension='html', context='uri'}">
                            ${item.title @ context='text'}
                        </a>
                    </h3>

                    <!--/* Text from subpage */-->
                    <sly data-sly-test="${item.subText}">
                        <p class="cmp-customlist__subtext">
                            ${item.subText @ context='html'}
                        </p>
                    </sly>

                </li>
            </sly>
        </ul>

        <!--/* Part 2: Load More button (hidden when no more pages) */-->
        <sly data-sly-test="${model.hasNext}">
            <div class="cmp-customlist__loadmore">
                <button class="cmp-customlist__loadmore-btn"
                        data-next-page="2"
                        type="button">
                    Load More
                </button>
            </div>
        </sly>

    </sly>

    <!--/* Edit mode placeholder */-->
    <sly data-sly-test="${model.pageItems.size == 0 && wcmmode.edit}">
        <div class="cmp-customlist__placeholder">
            Custom List — open the dialog to configure items.
        </div>
    </sly>

</div>
